<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hand Magic — MediaPipe Hands</title>
<style>
  :root{
    --ink:#05060a;
    --violet:#7c3aed;
    --cyan:#22d3ee;
    --gold:#f5c451;
    --mist:#c9cdea;
    --panel-bg: rgba(10,10,18,0.55);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; height:100%; background:var(--ink);
    font-family:'Segoe UI', system-ui, sans-serif;
    overflow:hidden;
  }
  #stage{
    position:relative; width:100vw; height:100vh;
    display:flex; align-items:center; justify-content:center;
  }
  video{
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; transform:scaleX(-1);
    filter:brightness(0.5) saturate(1.1);
  }
  canvas{
    position:absolute; inset:0; width:100%; height:100%;
    transform:scaleX(-1);
  }
  #hud{
    position:absolute; top:22px; left:50%; transform:translateX(-50%);
    color:var(--mist); font-size:13px; letter-spacing:.14em; text-transform:uppercase;
    background:rgba(10,10,20,0.45); border:1px solid rgba(124,58,237,0.4);
    padding:10px 18px; border-radius:999px; backdrop-filter:blur(8px);
    z-index:5; display:flex; align-items:center; gap:10px;
  }
  #dot{
    width:8px; height:8px; border-radius:50%; background:#555;
    box-shadow:0 0 8px #555;
    transition:.3s;
  }
  #dot.live{ background:var(--cyan); box-shadow:0 0 10px var(--cyan); }
  #hint{
    position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
    color:rgba(201,205,234,0.55); font-size:12px; letter-spacing:.05em;
    z-index:5; text-align:center;
  }
  #loading{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:var(--mist); font-size:14px; letter-spacing:.1em; z-index:10;
    background:var(--ink); text-align:center; padding:0 40px;
  }

  /* ---- Controls panel ---- */
  #panelToggle{
    position:absolute; top:22px; right:22px; z-index:6;
    width:40px; height:40px; border-radius:12px;
    background:var(--panel-bg); border:1px solid rgba(124,58,237,0.4);
    backdrop-filter:blur(8px); color:var(--mist);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:18px; user-select:none;
  }
  #panel{
    position:absolute; top:74px; right:22px; z-index:6;
    width:230px; background:var(--panel-bg); border:1px solid rgba(124,58,237,0.35);
    border-radius:16px; backdrop-filter:blur(10px); padding:16px;
    color:var(--mist); font-size:12.5px;
    display:flex; flex-direction:column; gap:14px;
    transition:opacity .2s, transform .2s;
  }
  #panel.hidden{ opacity:0; pointer-events:none; transform:translateY(-8px); }
  .panel-label{
    display:flex; justify-content:space-between; letter-spacing:.05em;
    text-transform:uppercase; font-size:10.5px; color:rgba(201,205,234,0.65);
    margin-bottom:6px;
  }
  .theme-row{ display:flex; gap:6px; flex-wrap:wrap; }
  .theme-swatch{
    width:26px; height:26px; border-radius:8px; cursor:pointer;
    border:2px solid transparent; transition:.15s;
  }
  .theme-swatch.active{ border-color:#fff; transform:scale(1.08); }
  input[type=range]{
    -webkit-appearance:none; width:100%; height:4px; border-radius:2px;
    background:rgba(124,58,237,0.3); outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:14px; height:14px; border-radius:50%;
    background:var(--cyan); cursor:pointer; box-shadow:0 0 6px var(--cyan);
  }
  .toggle-row{ display:flex; align-items:center; justify-content:space-between; }
  .switch{
    width:36px; height:20px; border-radius:999px; background:rgba(124,58,237,0.3);
    position:relative; cursor:pointer; transition:.2s;
  }
  .switch.on{ background:var(--cyan); }
  .switch::after{
    content:''; position:absolute; top:2px; left:2px; width:16px; height:16px;
    border-radius:50%; background:#fff; transition:.2s;
  }
  .switch.on::after{ left:18px; }
</style>
</head>
<body>
<div id="stage">
  <div id="loading">summoning the camera…</div>

  <div id="hud"><span id="dot"></span><span id="status">connecting</span></div>

  <div id="panelToggle">✦</div>
  <div id="panel" class="hidden">
    <div>
      <div class="panel-label"><span>Flame</span></div>
      <div class="theme-row" id="themeRow"></div>
    </div>
    <div>
      <div class="panel-label"><span>Intensity</span><span id="intensityVal">6</span></div>
      <input type="range" id="intensity" min="1" max="15" value="6">
    </div>
    <div>
      <div class="panel-label"><span>Flame size</span><span id="sizeVal">1.0x</span></div>
      <input type="range" id="sizeSlider" min="5" max="25" value="10">
    </div>
    <div>
      <div class="panel-label"><span>Trail length</span><span id="trailVal">26</span></div>
      <input type="range" id="trailSlider" min="6" max="60" value="26">
    </div>
    <div>
      <div class="panel-label"><span>Glow</span><span id="glowVal">28</span></div>
      <input type="range" id="glowSlider" min="5" max="60" value="28">
    </div>
    <div class="toggle-row">
      <span>Pinch burst</span>
      <div class="switch on" id="pinchToggle"></div>
    </div>
    <div class="toggle-row">
      <span>Draw all fingers</span>
      <div class="switch" id="allFingersToggle"></div>
    </div>
  </div>

  <video id="video" playsinline autoplay muted></video>
  <canvas id="fx"></canvas>
  <div id="hint">pinch thumb + index to burst · ✦ top-right to customize your fire</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('fx');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const dotEl = document.getElementById('dot');
const loadingEl = document.getElementById('loading');

function fail(msg){
  loadingEl.style.display = 'flex';
  loadingEl.textContent = msg;
  console.error(msg);
}

window.addEventListener('error', (e) => {
  fail('error: ' + (e.message || 'something broke — check console (F12)'));
});

window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    if (typeof Hands === 'undefined' || typeof Camera === 'undefined') {
      fail("couldn't load MediaPipe from the CDN — check your internet connection or try a different browser");
    }
  }, 4000);
});

if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
  fail('this browser/context has no camera access — open this file over http(s) or localhost, not directly from disk, and use Chrome/Edge/Firefox');
}

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ---------- Themes ----------
const THEMES = {
  fire:   { name:'Fire',   core:'#fff4c2', mid:'#ffb347', edge:'#ff3d1a', trail:'rgba(255,90,20,', swatch:'linear-gradient(135deg,#ffdd6a,#ff3d1a)' },
  ice:    { name:'Ice',    core:'#f0fbff', mid:'#7fe0ff', edge:'#1e6fe0', trail:'rgba(60,180,255,', swatch:'linear-gradient(135deg,#eafcff,#1e6fe0)' },
  toxic:  { name:'Toxic',  core:'#eaffb0', mid:'#8dff3d', edge:'#0fae4a', trail:'rgba(80,255,80,', swatch:'linear-gradient(135deg,#eaffb0,#0fae4a)' },
  royal:  { name:'Royal',  core:'#f3e8ff', mid:'#b26bff', edge:'#5b21b6', trail:'rgba(150,60,255,', swatch:'linear-gradient(135deg,#e9d5ff,#5b21b6)' },
  rainbow:{ name:'Rainbow',core:'#ffffff', mid:null,      edge:null,      trail:'rgba(255,255,255,', swatch:'linear-gradient(135deg,#ff3d6a,#ffb347,#3dd6ff,#b26bff)' },
};
const RAINBOW_HUES = [0,40,90,160,200,270,320];

let state = {
  theme: 'fire',
  intensity: 6,
  size: 1.0,
  trailLen: 26,
  glow: 28,
  pinchBurst: true,
  allFingers: false,
};

// ---------- Panel wiring ----------
const panel = document.getElementById('panel');
const panelToggle = document.getElementById('panelToggle');
panelToggle.addEventListener('click', () => panel.classList.toggle('hidden'));

const themeRow = document.getElementById('themeRow');
Object.keys(THEMES).forEach(key => {
  const sw = document.createElement('div');
  sw.className = 'theme-swatch' + (key === state.theme ? ' active' : '');
  sw.style.background = THEMES[key].swatch;
  sw.title = THEMES[key].name;
  sw.addEventListener('click', () => {
    state.theme = key;
    [...themeRow.children].forEach(c => c.classList.remove('active'));
    sw.classList.add('active');
  });
  themeRow.appendChild(sw);
});

const intensityEl = document.getElementById('intensity');
const intensityVal = document.getElementById('intensityVal');
intensityEl.addEventListener('input', () => {
  state.intensity = +intensityEl.value;
  intensityVal.textContent = intensityEl.value;
});

const sizeEl = document.getElementById('sizeSlider');
const sizeVal = document.getElementById('sizeVal');
sizeEl.addEventListener('input', () => {
  state.size = (+sizeEl.value) / 10;
  sizeVal.textContent = state.size.toFixed(1) + 'x';
});

const trailEl = document.getElementById('trailSlider');
const trailVal = document.getElementById('trailVal');
trailEl.addEventListener('input', () => {
  state.trailLen = +trailEl.value;
  trailVal.textContent = trailEl.value;
});

const glowEl = document.getElementById('glowSlider');
const glowVal = document.getElementById('glowVal');
glowEl.addEventListener('input', () => {
  state.glow = +glowEl.value;
  glowVal.textContent = glowEl.value;
});

const pinchToggle = document.getElementById('pinchToggle');
pinchToggle.addEventListener('click', () => {
  state.pinchBurst = !state.pinchBurst;
  pinchToggle.classList.toggle('on', state.pinchBurst);
});

const allFingersToggle = document.getElementById('allFingersToggle');
allFingersToggle.addEventListener('click', () => {
  state.allFingers = !state.allFingers;
  allFingersToggle.classList.toggle('on', state.allFingers);
});

// ---------- Particle system (flame-styled) ----------
let particles = [];

function themeColor(){
  const t = THEMES[state.theme];
  if (state.theme === 'rainbow'){
    const hue = RAINBOW_HUES[Math.floor(Math.random()*RAINBOW_HUES.length)];
    return { core:'#ffffff', mid:`hsl(${hue},100%,60%)`, edge:`hsl(${hue},100%,45%)` };
  }
  return { core:t.core, mid:t.mid, edge:t.edge };
}

class Particle {
  constructor(x,y,burst=false){
    this.x = x; this.y = y;
    const angle = burst ? Math.random()*Math.PI*2 : (-Math.PI/2 + (Math.random()-0.5)*1.4);
    const speed = burst ? Math.random()*9+3 : Math.random()*1.8+0.5;
    this.vx = Math.cos(angle)*speed;
    this.vy = Math.sin(angle)*speed - (burst?1:0.6);
    this.life = 1;
    this.decay = burst ? 0.02 + Math.random()*0.015 : 0.022 + Math.random()*0.02;
    this.baseSize = (burst ? Math.random()*6+3 : Math.random()*5+2.5) * state.size;
    const c = themeColor();
    this.core = c.core; this.mid = c.mid; this.edge = c.edge;
    this.flicker = Math.random()*Math.PI*2;
  }
  update(){
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.97;
    this.vy += this.mid ? -0.01 : 0.04;
    this.flicker += 0.4;
    this.life -= this.decay;
  }
  draw(ctx, glow){
    if (this.life <= 0) return;
    const r = Math.max(this.baseSize * (0.4 + this.life*0.6) * (1+Math.sin(this.flicker)*0.06), 0.5);
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r);
    if (this.mid && this.edge){
      grad.addColorStop(0, this.core);
      grad.addColorStop(0.4, this.mid);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
    } else {
      grad.addColorStop(0, this.core);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
    }
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = Math.max(this.life,0);
    ctx.shadowBlur = glow;
    ctx.shadowColor = this.mid || this.core;
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

let trail = [];

function drawTrail(){
  if(trail.length < 2) return;
  const t = THEMES[state.theme];
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for(let i=1;i<trail.length;i++){
    const p0 = trail[i-1], p1 = trail[i];
    const f = i/trail.length;
    ctx.strokeStyle = (t.trail || 'rgba(255,255,255,') + (f*0.5) + ')';
    ctx.lineWidth = f*10*state.size;
    ctx.lineCap = 'round';
    ctx.shadowBlur = state.glow*0.7;
    ctx.shadowColor = t.mid || '#fff';
    ctx.beginPath();
    ctx.moveTo(p0.x,p0.y);
    ctx.lineTo(p1.x,p1.y);
    ctx.stroke();
  }
  ctx.restore();
}

let lastPinchTime = 0;
let wasPinching = false;
const FINGERTIPS = [4, 8, 12, 16, 20];

function processHands(results){
  try {
    processHandsInner(results);
  } catch (err) {
    console.warn('render frame skipped:', err);
  }
}

function processHandsInner(results){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(results.multiHandLandmarks && results.multiHandLandmarks.length > 0){
    dotEl.classList.add('live');
    statusEl.textContent = 'hand detected';

    for(const landmarks of results.multiHandLandmarks){
      const indexTip = landmarks[8];
      const thumbTip = landmarks[4];

      const x = indexTip.x * canvas.width;
      const y = indexTip.y * canvas.height;
      const tx = thumbTip.x * canvas.width;
      const ty = thumbTip.y * canvas.height;

      trail.push({x,y});
      while(trail.length > state.trailLen) trail.shift();

      const tipsToDraw = state.allFingers ? FINGERTIPS : [8];
      for(const idx of tipsToDraw){
        const lm = landmarks[idx];
        const px = lm.x * canvas.width;
        const py = lm.y * canvas.height;
        for(let i=0;i<Math.max(1,Math.round(state.intensity/2));i++){
          particles.push(new Particle(px + (Math.random()-0.5)*8, py + (Math.random()-0.5)*8));
        }
      }

      const dist = Math.hypot(x-tx, y-ty);
      const isPinching = dist < 35;
      const now = performance.now();
      if(state.pinchBurst && isPinching && !wasPinching && now - lastPinchTime > 350){
        lastPinchTime = now;
        for(let i=0;i<45;i++){
          particles.push(new Particle((x+tx)/2, (y+ty)/2, true));
        }
      }
      wasPinching = isPinching;

      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.shadowBlur = state.glow;
      ctx.shadowColor = isPinching ? '#f5c451' : (THEMES[state.theme].mid || '#fff');
      ctx.fillStyle = isPinching ? '#f5c451' : (THEMES[state.theme].core);
      ctx.beginPath();
      ctx.arc(x,y, (isPinching?10:6)*state.size, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  } else {
    dotEl.classList.remove('live');
    statusEl.textContent = 'show your hand';
    trail = [];
  }

  drawTrail();

  particles = particles.filter(p => p.life > 0);
  const cap = 200 + state.intensity * 20;
  if (particles.length > cap) particles = particles.slice(particles.length - cap);
  particles.forEach(p => { p.update(); p.draw(ctx, state.glow); });
}

// ---------- MediaPipe setup ----------
try {
  if (typeof Hands === 'undefined' || typeof Camera === 'undefined') {
    throw new Error('MediaPipe library not loaded yet');
  }

  const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${file}`
  });

  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 0,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.6
  });

  hands.onResults(processHands);

  let sending = false;
  const camera = new Camera(video, {
    onFrame: async () => {
      if (sending) return;
      sending = true;
      try {
        await hands.send({image: video});
      } catch (err) {
        console.warn('hand frame skipped:', err);
      } finally {
        sending = false;
      }
    },
    width: 640,
    height: 480
  });

  camera.start().then(()=>{
    loadingEl.style.display = 'none';
  }).catch(err=>{
    fail('camera access denied or unavailable — allow camera permission in your browser and reload (' + (err.message || err) + ')');
  });
} catch (err) {
  fail('setup failed: ' + err.message);
}
</script>
</body>
</html>
